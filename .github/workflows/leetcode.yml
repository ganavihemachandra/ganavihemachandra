name: Sync LeetCode Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Update README
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          plugin_leetcode: yes
          plugin_leetcode_user: Ganavih
          plugin_leetcode_sections: cover
